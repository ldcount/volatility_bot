name: Continuous Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -v

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 49348 }} # Uses 22 if secret isn't set
          script: |
            cd /opt/bots/volatility_bot
            
            # 1. Pull the latest code
            git pull origin master
            
            # 2. Update dependencies
            ./venv/bin/pip install -r requirements.txt
            
            # 3. Refresh the systemd unit
            sudo cp volatility_bot.service /etc/systemd/system/volatility_bot.service
            sudo systemctl daemon-reload
            
            # 4. Restart the bot
            sudo systemctl restart volatility_bot.service
            
            # 5. Verify the bot is active
            systemctl is-active volatility_bot.service
